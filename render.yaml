services:
  - type: web
    name: voice-nimble-api
    env: node
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_products,read_orders,read_customers,read_content,read_shipping,write_draft_orders
      - key: SHOPIFY_HOST
        sync: false
      - key: JAMBONZ_BASE_URL
        sync: false
      - key: JAMBONZ_API_KEY
        sync: false
      - key: JAMBONZ_ACCOUNT_SID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: noreply@voicenimble.com
      - key: EMAIL_FROM_NAME
        value: Voice Nimble
      - key: APP_URL
        sync: false
